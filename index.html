.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:13px;color:var(--ink2);letter-spacing:.04em;transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.nav-right{display:flex;gap:10px;align-items:center}
.btn-sm{font-size:13px;font-weight:500;padding:8px 18px;border-radius:100px;transition:all .2s}
.btn-outline{border:2px solid var(--ink);color:var(--ink);background:none}
.btn-outline:hover{border-color:var(--ink)}
.btn-solid{background:var(--accent);color:#fff;border:1.5px solid var(--accent)}
.btn-solid:hover{background:var(--accent2);border-color:var(--accent2)}
.admin-toggle{font-size:11px;letter-spacing:.06em;padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:none;color:var(--ink3);transition:all .2s}
.admin-toggle:hover{color:var(--accent);border-color:var(--accent)}
.admin-toggle.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.resume-e{font-family:var(--serif);font-style:italic;font-size:1.08em}

/* Hamburger */
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;transition:border-color .2s}
.nav-burger:hover{border-color:var(--ink2)}
.nav-burger span{display:block;height:1.5px;background:var(--ink);border-radius:2px;transition:transform .35s var(--ease),opacity .25s,width .3s}
.nav-burger span:nth-child(2){width:70%}
.nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0;width:0}
.nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* Mobile drawer */
.nav-drawer{position:fixed;top:0;left:0;right:0;z-index:199;background:rgba(250,250,248,.97);backdrop-filter:blur(16px);padding:80px 28px 32px;display:flex;flex-direction:column;gap:0;transform:translateY(-100%);transition:transform .4s var(--ease);box-shadow:0 8px 32px rgba(0,0,0,.08)}
.nav-drawer.open{transform:translateY(0)}
.nav-drawer ul{list-style:none;display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border)}
.nav-drawer ul li a{display:block;font-size:17px;font-weight:500;color:var(--ink);padding:16px 0;border-bottom:1px solid var(--border);letter-spacing:-.01em;transition:color .2s,padding-left .25s var(--ease)}
.nav-drawer ul li a:hover{color:var(--accent);padding-left:6px}
.nav-drawer-btns{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.nav-drawer-btns .btn-sm{flex:1;text-align:center;justify-content:center}

/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
#hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:100px 48px 60px;gap:48px}
.hero-left{display:flex;flex-direction:column;gap:0}
.hero-eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:18px;opacity:0;transform:translateY(12px);animation:fadeUp .7s var(--ease) .2s forwards}
.hero-name{font-family:var(--serif);font-size:clamp(40px,5vw,68px);line-height:1.05;letter-spacing:-.02em;font-weight:600;opacity:0;transform:translateY(18px);animation:fadeUp .9s var(--ease) .38s forwards}
.hero-name em{font-style:italic;font-weight:400;color:var(--accent)}
.hero-tagline{font-size:14px;color:var(--ink2);line-height:1.8;margin-top:20px;max-width:380px;font-weight:300;opacity:0;transform:translateY(14px);animation:fadeUp .8s var(--ease) .55s forwards}
.hero-btns{display:flex;gap:10px;margin-top:32px;opacity:0;transform:translateY(10px);animation:fadeUp .7s var(--ease) .7s forwards}
.hero-brands{margin-top:56px;opacity:0;animation:fadeUp .7s var(--ease) .9s forwards}
.brands-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.brands-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.brand-logo-item{position:relative;height:40px;padding:0 16px;border:none;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;transition:opacity .25s,transform .25s var(--ease)}
.brand-logo-item:hover{transform:translateY(-2px);opacity:1!important}
.brand-logo-item img{height:28px;width:auto;max-width:120px;object-fit:contain;filter:grayscale(1);opacity:.45;transition:filter .3s,opacity .3s}
.brand-logo-item:hover img{filter:grayscale(0);opacity:1}
.brand-logo-fallback{font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:.02em;white-space:nowrap}
.brand-logo-item .brand-del-btn{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:#E53E3E;color:#fff;border:none;font-size:9px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1}
body.admin-mode .brand-logo-item .brand-del-btn{display:flex}
.brand-add-btn{height:44px;padding:0 16px;border:1.5px dashed var(--border);border-radius:12px;background:transparent;display:none;align-items:center;gap:6px;font-size:12px;color:var(--ink3);cursor:pointer;transition:border-color .2s,color .2s}
.brand-add-btn:hover{border-color:var(--accent);color:var(--accent)}
body.admin-mode .brand-add-btn{display:flex}

/* Hero slider */
.hero-right{position:relative;height:520px;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeUp .9s var(--ease) .5s forwards}
.hero-slider{position:relative;width:100%;height:100%;overflow:hidden;border-radius:24px}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s var(--ease);display:flex;align-items:center;justify-content:center}
.hero-slide.active{opacity:1}
.slide-phone-wrap{position:relative;display:flex;gap:16px;align-items:center;justify-content:center;height:100%}
.phone-card{background:#fff;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.12);overflow:hidden;flex-shrink:0}
.phone-main{width:200px;height:380px;background:linear-gradient(160deg,#F0F7F4 0%,#fff 100%)}
.phone-secondary{width:170px;height:320px;background:linear-gradient(160deg,#F0F4FF 0%,#fff 100%);margin-top:30px}
.phone-screen{width:100%;height:100%;padding:20px 14px;display:flex;flex-direction:column;gap:8px}
.ps-header{font-family:var(--serif);font-size:11px;font-weight:600;color:var(--ink2)}
.ps-amount{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink);margin:4px 0}
.ps-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;background:var(--accent-light);color:var(--accent);padding:3px 8px;border-radius:100px;font-weight:500}
.ps-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}
.ps-row-name{font-size:9px;color:var(--ink2)}
.ps-row-val{font-size:9px;font-weight:600;color:var(--ink)}
.ps-row-val.neg{color:#E53E3E}
.ps-row-val.pos{color:var(--accent)}
.ps-btn{margin-top:8px;width:100%;padding:7px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:9px;font-weight:600}

/* Slide 2 */
.slide2-content{display:flex;flex-direction:column;gap:16px;padding:32px;background:linear-gradient(140deg,#F9F6F0,#fff);border-radius:24px;width:300px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
.s2-label{font-size:11px;color:var(--ink3);letter-spacing:.06em}
.s2-num{font-family:var(--serif);font-size:36px;font-weight:600;color:var(--accent)}
.s2-desc{font-size:12px;color:var(--ink2);line-height:1.6}
.s2-tag{display:inline-flex;gap:6px;flex-wrap:wrap}
.s2-chip{font-size:10px;padding:3px 10px;border-radius:100px;background:var(--accent-light);color:var(--accent)}

/* Slide 3 */
.slide3-content{background:#fff;border-radius:24px;padding:28px;width:280px;box-shadow:0 20px 60px rgba(0,0,0,.1)}
.s3-icon{width:40px;height:40px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px}
.s3-title{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:8px}
.s3-list{display:flex;flex-direction:column;gap:6px}
.s3-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.s3-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   SECTION SHARED
═══════════════════════════════════════ */
.section{padding:80px 48px;opacity:0;transform:translateY(30px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.section.visible{opacity:1;transform:none}
.sec-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sec-label::before{content:'';width:24px;height:1px;background:var(--accent)}
.sec-title{font-family:var(--serif);font-size:clamp(24px,3vw,36px);font-weight:600;letter-spacing:-.02em;line-height:1.15}
.sec-head{margin-bottom:40px}

/* ═══════════════════════════════════════
   WORKS SECTION
═══════════════════════════════════════ */
#works{background:var(--surface)}
.works-top{display:flex;justify-content:space-between;align-items:flex-end}
.tab-row{display:flex;gap:6px;margin-top:16px}
.tab-btn{font-size:12px;font-weight:500;padding:7px 18px;border-radius:100px;border:1.5px solid var(--border);background:none;color:var(--ink2);transition:all .2s}
.tab-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab-btn:hover:not(.on){border-color:var(--ink2);color:var(--ink)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}

/* Project card */
.proj-card{border-radius:var(--card-r);border:1.5px solid var(--border);background:var(--surface);overflow:hidden;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s var(--ease);position:relative}
.proj-card:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.09)}
.proj-img-wrap{position:relative;aspect-ratio:4/3;background:#F0F0EE;overflow:hidden}
.proj-img-wrap img,.proj-img-placeholder{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.proj-img-placeholder{display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#F0EDE8,#E8F0EE);font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink3)}
.proj-card:hover .proj-img-wrap img,.proj-card:hover .proj-img-placeholder{transform:scale(1.04)}
.proj-tag{position:absolute;top:12px;left:12px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:4px 10px;border-radius:100px;color:var(--accent)}
.proj-body{padding:20px}
.proj-title{font-family:var(--serif);font-size:17px;font-weight:600;line-height:1.3;margin-bottom:6px}
.proj-desc{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:14px}
.proj-contrib{background:var(--accent-light);border-radius:10px;padding:12px 14px}
.contrib-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.contrib-text{font-size:12px;color:var(--ink2);line-height:1.55}
.proj-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.proj-stack{font-size:11px;color:var(--ink3)}
.proj-arrow{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;transition:background .2s,transform .2s}
.proj-card:hover .proj-arrow{background:var(--accent);transform:translateX(2px)}

/* Admin add card */
.add-card{border-radius:var(--card-r);border:1.5px dashed var(--border);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:300px;cursor:pointer;transition:border-color .2s,background .2s}
.add-card:hover{border-color:var(--accent);background:var(--accent-light)}
.add-icon{width:40px;height:40px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.add-card:hover .add-icon{background:var(--accent);color:#fff}
.add-label{font-size:13px;color:var(--ink3);font-weight:500}

/* ═══════════════════════════════════════
   GALLERY
═══════════════════════════════════════ */
#gallery{background:var(--bg)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gallery-item{border-radius:12px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;background:#F0EDE8}
.gallery-item img,.gallery-placeholder{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.gallery-placeholder{display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#F0EDE8,#E8EEF0);font-size:13px;font-style:italic;font-family:var(--serif);color:var(--ink3)}
.gallery-item:hover img,.gallery-item:hover .gallery-placeholder{transform:scale(1.06)}
.gallery-item::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s}
.gallery-item:hover::after{background:rgba(0,0,0,.08)}
.gallery-zoom{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transform:scale(.8);transition:opacity .25s,transform .25s;z-index:1}
.gallery-item:hover .gallery-zoom{opacity:1;transform:scale(1)}
.gallery-add-row{display:flex;gap:12px;margin-top:12px}

/* Gallery modal */
#galleryModal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center}
#galleryModal.open{display:flex}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);animation:fadeIn .3s}
.modal-box{position:relative;z-index:1;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:16px;animation:scaleIn .35s var(--ease)}
.modal-img-wrap{position:relative;border-radius:16px;overflow:hidden;max-height:75vh}
.modal-img-wrap img{max-height:75vh;max-width:80vw;object-fit:contain;display:block}
.modal-nav{display:flex;align-items:center;gap:16px}
.modal-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .2s;cursor:pointer}
.modal-btn:hover{background:rgba(255,255,255,.3)}
.modal-dots{display:flex;gap:6px}
.modal-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);transition:background .2s}
.modal-dot.on{background:#fff}
.modal-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;border-radius:50%;background:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:2;transition:transform .2s}
.modal-close:hover{transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

/* ═══════════════════════════════════════
   BLOGS
═══════════════════════════════════════ */
#blogs{background:var(--surface)}
.blogs-scroll{display:flex;gap:16px;overflow-x:auto;padding:4px 0 16px;scrollbar-width:none}
.blogs-scroll::-webkit-scrollbar{display:none}
.blog-card{flex-shrink:0;width:240px;border-radius:var(--card-r);border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s;text-decoration:none;color:inherit;display:block}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.08)}
.blog-img{height:140px;background:#F0EDE8;overflow:hidden;position:relative}
.blog-img img{width:100%;height:100%;object-fit:cover;transition:transform .45s var(--ease)}
.blog-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#F5EDE8,#E8F0EE);font-family:var(--serif);font-style:italic;font-size:12px;color:var(--ink3)}
.blog-card:hover .blog-img img{transform:scale(1.06)}
.blog-body{padding:14px}
.blog-cat{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.blog-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;color:var(--ink)}
.blog-sub{font-size:11px;color:var(--ink3);line-height:1.5}
.blog-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.blog-arrow{font-size:12px;color:var(--accent);font-weight:600;transition:transform .2s}
.blog-card:hover .blog-arrow{transform:translateX(3px)}

/* ═══════════════════════════════════════
   TESTIMONIALS
═══════════════════════════════════════ */
#testimonials{background:var(--bg)}
.testi-wrapper{position:relative;overflow:hidden}
.testi-track{display:flex;gap:16px;transition:transform .6s var(--ease)}
.testi-card{flex-shrink:0;width:380px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--card-r);padding:28px;transition:border-color .3s}
.testi-card:hover{border-color:var(--accent)}
.testi-stars{display:flex;gap:3px;margin-bottom:14px}
.star{color:#F59E0B;font-size:13px}
.testi-quote{font-family:var(--serif);font-size:15px;font-style:italic;line-height:1.7;color:var(--ink);margin-bottom:20px;position:relative;padding-left:16px}
.testi-quote::before{content:'"';position:absolute;left:0;top:-4px;font-size:32px;color:var(--accent);line-height:1;font-family:var(--serif)}
.testi-person{display:flex;align-items:center;gap:12px}
.testi-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:14px;color:#fff}
.testi-name{font-size:14px;font-weight:600;margin-bottom:2px}
.testi-role{font-size:11px;color:var(--ink3)}
.testi-company{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:100px;margin-top:4px;font-weight:500}
.testi-nav{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.tnav-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink2);transition:all .2s;cursor:pointer}
.tnav-btn:hover{border-color:var(--accent);color:var(--accent)}
.testi-dots{display:flex;gap:6px;margin-top:16px}
.testi-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s,width .3s;border:none;cursor:pointer}
.testi-dot.on{background:var(--accent);width:18px;border-radius:3px}

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
#footer{background:var(--ink);color:#fff;padding:64px 48px 32px}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:48px;margin-bottom:48px}
.foot-brand{display:flex;flex-direction:column;gap:14px}
.foot-logo{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff}
.foot-tagline{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;max-width:260px}
.foot-ctas{display:flex;gap:10px;margin-top:8px}
.foot-btn{font-size:13px;font-weight:500;padding:9px 20px;border-radius:100px;transition:all .2s;cursor:pointer;font-family:var(--sans)}
.foot-btn-primary{background:var(--accent);color:#fff;border:1.5px solid var(--accent)}
.foot-btn-primary:hover{background:#3D8B6B}
.foot-btn-ghost{background:none;color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.2)}
.foot-btn-ghost:hover{border-color:rgba(255,255,255,.5);color:#fff}
.foot-col h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:16px;font-weight:500}
.foot-links{display:flex;flex-direction:column;gap:10px}
.foot-links a{font-size:13px;color:rgba(255,255,255,.55);transition:color .2s}
.foot-links a:hover{color:#fff}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid rgba(255,255,255,.08)}
.foot-copy{font-size:12px;color:rgba(255,255,255,.28)}
.foot-socials{display:flex;gap:10px}
.social-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.4);transition:all .2s;cursor:pointer}
.social-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}

/* ═══════════════════════════════════════
   PROJECT DETAIL PAGE
═══════════════════════════════════════ */
#detail-page{position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;display:none;opacity:0;transition:opacity .4s var(--ease)}
#detail-page.open{display:block}
#detail-page.visible{opacity:1}
.detail-nav{position:sticky;top:0;background:rgba(250,250,248,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 48px;display:flex;align-items:center;gap:16px;z-index:10}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:1.5px solid var(--border);padding:7px 16px;border-radius:100px;transition:all .2s;cursor:pointer}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}
.detail-title-bar{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink)}
.detail-content{padding:48px}
.detail-hero-img{width:100%;aspect-ratio:16/7;border-radius:16px;overflow:hidden;background:#F0EDE8;margin-bottom:48px}
.detail-hero-img img{width:100%;height:100%;object-fit:cover}
.detail-hero-img .detail-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#F0EDE8,#E8F0EE);font-family:var(--serif);font-style:italic;color:var(--ink3)}
.detail-grid{display:grid;grid-template-columns:2fr 1fr;gap:48px}
.detail-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:8px}
.detail-h1{font-family:var(--serif);font-size:clamp(28px,4vw,48px);font-weight:600;letter-spacing:-.02em;line-height:1.1;margin-bottom:16px}
.detail-desc{font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:28px}
.detail-contrib{background:var(--accent-light);border-radius:12px;padding:20px 22px;margin-bottom:28px}
.detail-contrib h4{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.detail-contrib p{font-size:14px;color:var(--ink2);line-height:1.7}
.detail-meta{display:flex;flex-direction:column;gap:20px}
.meta-item{padding:16px;background:var(--surface);border-radius:12px;border:1.5px solid var(--border)}
.meta-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.meta-val{font-size:14px;font-weight:500;color:var(--ink)}
.detail-imgs-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:32px}
.detail-imgs-row img,.d-img-placeholder{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;background:linear-gradient(140deg,#F0EDE8,#E8EEF0)}
.d-img-placeholder{display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:12px;color:var(--ink3)}

/* ═══════════════════════════════════════
   ADMIN PANEL
═══════════════════════════════════════ */
#admin-panel{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border);z-index:400;transform:translateX(100%);transition:transform .4s var(--ease);box-shadow:-20px 0 60px rgba(0,0,0,.06);overflow-y:auto;display:flex;flex-direction:column}
#admin-panel.open{transform:none}
.admin-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1}
.admin-h{font-size:14px;font-weight:600;color:var(--ink)}
.admin-close{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:none;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.admin-close:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.admin-body{padding:20px 24px;flex:1}
.admin-section{margin-bottom:28px}
.admin-sec-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.admin-field{margin-bottom:14px}
.admin-field label{font-size:12px;font-weight:500;color:var(--ink2);display:block;margin-bottom:5px}
.admin-field input,.admin-field textarea,.admin-field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);color:var(--ink);background:var(--bg);transition:border-color .2s;outline:none}
.admin-field input:focus,.admin-field textarea:focus{border-color:var(--accent)}
.admin-field textarea{resize:vertical;min-height:70px}
.admin-upload{border:1.5px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.admin-upload:hover{border-color:var(--accent);background:var(--accent-light)}
.admin-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.admin-upload-icon{font-size:22px;margin-bottom:6px}
.admin-upload p{font-size:12px;color:var(--ink3)}
.admin-upload strong{color:var(--accent);font-weight:500}
.admin-save{width:100%;padding:11px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:600;font-family:var(--sans);transition:background .2s;cursor:pointer;margin-top:6px}
.admin-save:hover{background:var(--accent2)}
.admin-delete{width:100%;padding:9px;border-radius:10px;background:none;color:#E53E3E;border:1.5px solid #E53E3E;font-size:13px;font-weight:500;font-family:var(--sans);transition:all .2s;cursor:pointer;margin-top:8px}
.admin-delete:hover{background:#E53E3E;color:#fff}
.admin-list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:var(--bg)}
.ali-name{font-size:13px;font-weight:500;color:var(--ink)}
.ali-actions{display:flex;gap:6px}
.ali-btn{font-size:11px;padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:none;cursor:pointer;transition:all .2s}
.ali-btn.edit:hover{border-color:var(--accent);color:var(--accent)}
.ali-btn.del:hover{border-color:#E53E3E;color:#E53E3E}
.admin-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.admin-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--ink3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;border-top:none;border-left:none;border-right:none;background:none}
.admin-tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════════

const GRAD=[
  'linear-gradient(140deg,#F0EDE8,#E8D8C8)','linear-gradient(140deg,#E8EDF5,#C8D8E8)',
  'linear-gradient(140deg,#EDE8F0,#D8C8E8)','linear-gradient(140deg,#E8F0EC,#C8E0D0)',

function renderProjects(filter='all'){

function renderGallery(){
  const g=document.getElementById('galleryGrid');

    <div class="gallery-item" onclick="openGalleryModal(${i})">
      ${item.img?`<img src="${item.img}" alt="${item.title}">`:`<div class="gallery-placeholder" style="background:${grad(i)}">${item.title}</div>`}
      <span class="gallery-zoom">⤢</span>
      ${document.body.classList.contains('admin-mode')?`<button onclick="event.stopPropagation();deleteGalleryItem(${item.id})" style="position:absolute;top:8px;right:36px;width:22px;height:22px;border-radius:50%;background:rgba(229,62,62,.9);color:#fff;border:none;font-size:10px;cursor:pointer">✕</button>`:''}
    </div>`).join('');
}

/* Gallery modal */
let modalIdx=0;
function openGalleryModal(idx){
  modalIdx=idx;
  const modal=document.getElementById('galleryModal');
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  updateModal();
}
function updateModal(){
  const item=data.gallery[modalIdx];
  const img=document.getElementById('modalImg');
  img.src=item.img||'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect width="600" height="400" fill="%23F0EDE8"/><text x="300" y="200" text-anchor="middle" font-family="Georgia" font-style="italic" font-size="18" fill="%23A0A0A0">'+encodeURIComponent(item.title)+'</text></svg>';
  const dots=document.getElementById('modalDots');
  dots.innerHTML=data.gallery.map((_,i)=>`<button class="modal-dot${i===modalIdx?' on':''}" onclick="modalNav(${i-modalIdx})"></button>`).join('');
}
function modalNav(dir){
  modalIdx=Math.max(0,Math.min(data.gallery.length-1,modalIdx+dir));
  updateModal();
}
function closeModal(){
  document.getElementById('galleryModal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('galleryModal').classList.contains('open')){
    if(e.key==='ArrowLeft')modalNav(-1);
    if(e.key==='ArrowRight')modalNav(1);
    if(e.key==='Escape')closeModal();
  }
  if(document.getElementById('detail-page').classList.contains('open')&&e.key==='Escape')closeDetail();
});

   PROJECT DETAIL
═══════════════════════════════════════ */
function openDetail(id){
  const p=data.projects.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('detailTitleBar').textContent=p.title;
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-hero-img">
      ${p.img?`<img src="${p.img}" alt="${p.title}">`:`<div class="detail-placeholder">${p.title}</div>`}
    </div>
    <div class="detail-grid">
      <div>
        <p class="detail-label">${p.tag}</p>
        <h1 class="detail-h1">${p.title}</h1>
        <p class="detail-desc">${p.detailDesc||p.desc}</p>
        <div class="detail-contrib">
          <h4>My Contribution</h4>
          <p>${p.contribution}</p>
        </div>
        <div class="detail-imgs-row">
          ${(p.detailImgs||[]).map((img,i)=>img?`<img src="${img}" alt="screen">`:`<div class="d-img-placeholder" style="background:${grad(i)}">Screen ${i+1}</div>`).join('')}
        </div>
      </div>
      <div class="detail-meta">
        <div class="meta-item"><p class="meta-label">Category</p><p class="meta-val">${p.tag}</p></div>
        <div class="meta-item"><p class="meta-label">Tech Stack</p><p class="meta-val">${p.stack}</p></div>
        <div class="meta-item"><p class="meta-label">Role</p><p class="meta-val">Lead UX Designer</p></div>
      </div>
    </div>`;
  const page=document.getElementById('detail-page');
  page.style.display='block';
  page.scrollTop=0;
  requestAnimationFrame(()=>{page.classList.add('open');requestAnimationFrame(()=>page.classList.add('visible'));});
  document.body.style.overflow='hidden';
}
function closeDetail(){
  const page=document.getElementById('detail-page');
  page.classList.remove('visible');
  setTimeout(()=>{page.classList.remove('open');page.style.display='none';},400);
  document.body.style.overflow='';
}
function goHome(){
  closeDetail();
  window.scrollTo({top:0,behavior:'smooth'});
}

   RENDER BRANDS
═══════════════════════════════════════ */
function renderBrands(){
  const row=document.getElementById('brandsRow');
  row.innerHTML=data.brands.map(b=>`
    <div class="brand-logo-item">
      ${b.logo
        ?`<img src="${b.logo}" alt="${b.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="brand-logo-fallback" style="display:none">${b.name}</span>`
        :`<span class="brand-logo-fallback">${b.name}</span>`}
      <button class="brand-del-btn" onclick="deleteBrand(${b.id})" title="Remove">✕</button>

let heroIdx=0;
const slides=document.querySelectorAll('.hero-slide');
function heroNext(){
  slides[heroIdx].classList.remove('active');
  heroIdx=(heroIdx+1)%slides.length;
  slides[heroIdx].classList.add('active');
}
setInterval(heroNext,3500);

/* ═══════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════ */
const revealObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});
},{threshold:.1});
document.querySelectorAll('.section').forEach(s=>revealObs.observe(s));

/* ═══════════════════════════════════════
   MOBILE DRAWER
═══════════════════════════════════════ */
function toggleDrawer(){
  const drawer=document.getElementById('navDrawer');
  const burger=document.getElementById('navBurger');
  const open=drawer.classList.toggle('open');
  burger.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeDrawer(){
  document.getElementById('navDrawer').classList.remove('open');
  document.getElementById('navBurger').classList.remove('open');
  document.body.style.overflow='';
}
// Close drawer on scroll
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('solid',scrollY>60);
  if(scrollY>80)closeDrawer();
});

   INIT
═══════════════════════════════════════ */
let adminMode=false;
function toggleAdmin(){
  adminMode=!adminMode;
  document.body.classList.toggle('admin-mode',adminMode);
  document.getElementById('adminToggle').classList.toggle('active',adminMode);
  if(adminMode){document.getElementById('admin-panel').classList.add('open');renderAdminTab('projects');}
  else closeAdminPanel();
  renderBrands();
  renderGallery();
}
function closeAdminPanel(){
  document.getElementById('admin-panel').classList.remove('open');
  if(!adminMode)return;
  adminMode=false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminToggle').classList.remove('active');
  renderBrands();
  renderGallery();
}
function openAdminPanel(tab){
  document.getElementById('admin-panel').classList.add('open');
  switchAdminTab(tab,document.querySelector(`.admin-tab[onclick*="${tab}"]`)||document.querySelector('.admin-tab'));
}
function switchAdminTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderAdminTab(tab);
}

function renderAdminTab(tab){
  const el=document.getElementById('adminTabContent');
  if(tab==='projects')el.innerHTML=renderAdminProjects();
  else if(tab==='brands')el.innerHTML=renderAdminBrands();
  else if(tab==='gallery')el.innerHTML=renderAdminGallery();
  else if(tab==='blogs')el.innerHTML=renderAdminBlogs();
  else if(tab==='testimonials')el.innerHTML=renderAdminTestimonials();
}

function renderAdminBrands(){
  return `
    <div class="admin-section">
      <p class="admin-sec-title">Company Logos (${data.brands.length})</p>
      <p style="font-size:11px;color:var(--ink3);margin-bottom:12px;line-height:1.6">Logos show grayscale by default, full color on hover. Use transparent-background PNGs or SVGs for best results.</p>

          <div style="border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;align-items:center;background:var(--bg)">
            <div style="height:32px;display:flex;align-items:center">
              ${b.logo?`<img src="${b.logo}" style="max-height:28px;max-width:80px;object-fit:contain" onerror="this.style.opacity='.3'">`:`<span style="font-size:11px;color:var(--ink3)">${b.name}</span>`}

          </div>`).join('')}
      </div>
    </div>

      <p class="admin-sec-title">Add Company Logo</p>
      <div class="admin-field"><label>Company Name</label><input id="brName" placeholder="e.g. Stripe"></div>

          <p>Upload PNG / SVG<br><strong>Transparent bg recommended</strong></p>

          <input type="hidden" id="brImgData">
        </div>
      </div>

      </div>
      <button class="admin-save" onclick="saveBrand()">Add Logo</button>
    </div>`;
}

function saveBrand(){
  const name=v('brName');
  const url=v('brUrl');
  const upload=v('brImgData');
  if(!name)return toast('Enter a company name');
  const logo=url||upload||'';
  data.brands.push({id:nid(),name,logo});
  renderBrands();renderAdminTab('brands');toast(`${name} added ✓`);
}
function deleteBrand(id){
  data.brands=data.brands.filter(b=>b.id!==id);
  renderBrands();toast('Removed');
}

/* ─── CRUD ─── */
let nextId=100;
function nid(){return ++nextId}

function saveProject(){
  const p={id:nid(),title:v('pTitle'),type:v('pType'),tag:v('pTag'),desc:v('pDesc'),contribution:v('pContrib'),stack:v('pStack'),img:v('pImgData'),detailDesc:v('pDesc'),detailImgs:[]};
  if(!p.title)return toast('Please enter a title');
  data.projects.push(p);renderProjects();renderAdminTab('projects');toast('Project saved ✓');
}
function editProject(id){
  const p=data.projects.find(x=>x.id===id);
  if(!p)return;
  setv('pTitle',p.title);setv('pType',p.type);setv('pTag',p.tag);setv('pDesc',p.desc);setv('pContrib',p.contribution);setv('pStack',p.stack);
  document.getElementById('projectEditForm').scrollIntoView({behavior:'smooth'});
}
function deleteProject(id){
  if(!confirm('Delete this project?'))return;
  data.projects=data.projects.filter(p=>p.id!==id);renderProjects();renderAdminTab('projects');toast('Deleted');
}
function saveGalleryItem(){
  const item={id:nid(),title:v('gTitle')||'Untitled',img:v('gImgData')};
  data.gallery.push(item);renderGallery();renderAdminTab('gallery');toast('Image added ✓');
}
function deleteGalleryItem(id){
  data.gallery=data.gallery.filter(g=>g.id!==id);renderGallery();toast('Removed');
}
function saveBlog(){
  const b={id:nid(),title:v('bTitle'),cat:v('bCat'),sub:v('bSub'),url:v('bUrl')||'#',img:v('bImgData')};
  if(!b.title)return toast('Please enter a title');
  data.blogs.push(b);renderBlogs();renderAdminTab('blogs');toast('Blog added ✓');
}
function deleteBlog(id){
  data.blogs=data.blogs.filter(b=>b.id!==id);renderBlogs();renderAdminTab('blogs');toast('Deleted');
}
function saveTestimonial(){
  const t={id:nid(),name:v('tName')||'Anonymous',role:v('tRole'),company:v('tCompany'),quote:v('tQuote'),stars:5,color:v('tColor')||'#2D6A4F'};
  if(!t.quote)return toast('Please enter a quote');
  data.testimonials.push(t);testiIdx=0;renderTestimonials();renderAdminTab('testimonials');toast('Testimonial added ✓');
}
function deleteTestimonial(id){
  data.testimonials=data.testimonials.filter(t=>t.id!==id);renderTestimonials();renderAdminTab('testimonials');toast('Deleted');
}

function handleImg(input,previewId,dataId){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const prev=document.getElementById(previewId);
    prev.src=e.target.result;prev.style.display='block';
    document.getElementById(dataId).value=e.target.result;
  };
  r.readAsDataURL(file);
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():''}
function setv(id,val){const el=document.getElementById(id);if(el)el.value=val}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

const ADMIN_PW = 'T360';
let adminUnlocked = false;

function openPwModal(){
  const modal = document.getElementById('pwModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  setTimeout(()=>document.getElementById('pwInput').focus(), 100);
}
function closePwModal(){
  document.getElementById('pwModal').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').style.display = 'none';
  if(!adminUnlocked) document.body.style.overflow = '';
}
function clearPwError(){
  document.getElementById('pwError').style.display = 'none';
  document.getElementById('pwInput').style.borderColor = 'var(--border)';
}
function checkPw(){
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PW){
    adminUnlocked = true;
    closePwModal();
    // Show admin buttons
    document.getElementById('adminToggle').style.display = '';
    document.getElementById('adminToggleDrawer').style.display = '';
    // Auto-open admin panel
    toggleAdmin();
    toast('Admin unlocked ✓');
  } else {
    const err = document.getElementById('pwError');
    const inp = document.getElementById('pwInput');
    err.style.display = 'block';
    inp.style.borderColor = '#E53E3E';
    inp.value = '';
    inp.focus();
    // Shake animation
    inp.style.animation = 'none';
    inp.offsetHeight;
    inp.style.animation = 'shake .35s var(--ease)';
  }
}
function togglePwVis(){
  const inp = document.getElementById('pwInput');
  const btn = document.getElementById('pwVisBtn');
  if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// Shift+M shortcut
document.addEventListener('keydown', e => {
  if(e.shiftKey && e.key === 'M'){
    e.preventDefault();
    if(adminUnlocked){ toggleAdmin(); }
    else { openPwModal(); }
  }
  if(e.key === 'Escape') closePwModal();
});
