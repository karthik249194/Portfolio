<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthikeyan Sridhar — Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ─── VARIABLES ─── */
        :root {
            --black: #06040F;
            --white: #FAFAF8;
            --primary: #c2185b;
            --accent: #E91E8C;
            --grey-500: rgba(255,255,255,0.45);
            --radius: 16px;
            --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            
            /* RESPONSIVE PADDING */
            --gutter: clamp(24px, 8vw, 120px); 
            --section-spacing: 120px; 
        }

        /* ─── RESET & BASE ─── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Google Sans', sans-serif;
            color: #F0EEF8;
            background-color: var(--black);
            background-image: 
                radial-gradient(ellipse at 0% 0%, rgba(80,20,160,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(20,40,180,0.3) 0%, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* ─── NAVIGATION ─── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px var(--gutter);
            background: rgba(6,4,15,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-logo { font-family: 'Google Sans Display', sans-serif; font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 10px; align-items: center; }
        .nav-link { 
            font-size: 14px; color: rgba(255,255,255,0.7); text-decoration: none; 
            padding: 8px 16px; border-radius: 40px; transition: 0.3s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* HAMBURGER */
        .nav-hamburger { 
            display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 110; 
        }
        .nav-hamburger span { width: 24px; height: 2px; background: #fff; transition: 0.3s; }

        /* ─── HERO ─── */
        .hero {
            min-height: 100vh;
            display: grid; grid-template-columns: 1fr 1fr; align-items: center;
            padding: 120px var(--gutter); gap: 60px;
        }
        .hero-name { font-size: clamp(40px, 6vw, 80px); font-weight: 700; line-height: 1; margin-bottom: 20px; }
        .hero-bio { font-size: 18px; color: var(--grey-500); max-width: 500px; margin-bottom: 32px; }
        
        .btn-primary {
            padding: 14px 28px; background: linear-gradient(135deg, #6B21A8, #E91E8C);
            color: #fff; text-decoration: none; border-radius: 40px; font-weight: 500;
            display: inline-block; transition: 0.3s;
        }

        /* ─── SECTIONS ─── */
        .section {
            padding: var(--section-spacing) var(--gutter);
            width: 100%;
        }
        .section-header { margin-bottom: 48px; }
        .section-title { font-size: clamp(28px, 4vw, 42px); font-weight: 700; }

        /* ─── GRID SYSTEMS ─── */
        .works-grid, .testi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; border-radius: var(--radius);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* ─── RESPONSIVE OVERRIDES ─── */
        @media (max-width: 1024px) {
            .hero { grid-template-columns: 1fr; text-align: center; padding-top: 160px; }
            .hero-bio { margin: 0 auto 32px; }
            .works-grid, .testi-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            :root { --section-spacing: 80px; }
            .nav-links {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 70%;
                background: #0A0814; flex-direction: column; padding-top: 100px;
                transition: 0.4s var(--ease);
            }
            .nav-links.active { right: 0; }
            .nav-hamburger { display: flex; }
            .works-grid, .testi-grid { grid-template-columns: 1fr; }
            
            /* Hamburger Animation */
            .nav-hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .nav-hamburger.active span:nth-child(2) { opacity: 0; }
            .nav-hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">KS</a>
        <div class="nav-links" id="navLinks">
            <a href="#work" class="nav-link">Work</a>
            <a href="#about" class="nav-link">About</a>
            <a href="#blog" class="nav-link">Blog</a>
            <a href="mailto:hello@example.com" class="btn-primary" style="margin-left: 10px;">Contact</a>
        </div>
        <div class="nav-hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-left">
            <h1 class="hero-name">Karthikeyan<br>Sridhar</h1>
            <p class="hero-bio">Full-stack designer and developer focused on building high-end digital experiences that blend aesthetic with performance.</p>
            <div class="hero-actions">
                <a href="#work" class="btn-primary">View Projects</a>
            </div>
        </div>
        <div class="hero-right">
            <!-- Your Carousel Code Here -->
        </div>
    </section>

    <section class="section" id="work">
        <div class="section-header">
            <h2 class="section-title">Selected Works</h2>
        </div>
        <div class="works-grid">
            <div class="card"><h3>Project One</h3><p>UI/UX & Development</p></div>
            <div class="card"><h3>Project Two</h3><p>Branding</p></div>
            <div class="card"><h3>Project Three</h3><p>Product Design</p></div>
        </div>
    </section>

    <script>
        // ─── MOBILE MENU LOGIC ───
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close menu when a link is clicked
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // ─── HEADER SCROLL EFFECT ───
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.style.padding = '12px var(--gutter)';
                nav.style.background = 'rgba(6,4,15,0.95)';
            } else {
                nav.style.padding = '20px var(--gutter)';
                nav.style.background = 'rgba(6,4,15,0.7)';
            }
        });
    </script>
</body>
</html>
